interface:
  display_name: "Antibug"
  short_description: "Pre-execution failure prediction and mitigation"
  brand_color: "#EF4444"
  default_prompt: "Predict potential failures before code execution."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
