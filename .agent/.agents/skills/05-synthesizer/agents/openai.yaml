interface:
  display_name: "Synthesizer"
  short_description: "Ensemble Plan Evaluation & Master Synthesis"
  brand_color: "#A855F7"
  default_prompt: "Compare the AI plans in the Plan/ folder and generate a master implementation file."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
