interface:
  display_name: "Code Reviewer"
  short_description: "Performs comprehensive 5-axis code reviews"
  brand_color: "#10B981"
  default_prompt: "Review code for correctness, readability, architecture, security, and performance."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
