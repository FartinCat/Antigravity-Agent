interface:
  display_name: "Market Evaluator"
  short_description: "Estimate market value and suggest commercial pricing"
  brand_color: "#14B8A6"
  default_prompt: "Evaluate this project's market value and suggest licensing fees."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
