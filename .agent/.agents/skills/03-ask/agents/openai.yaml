interface:
  display_name: "Ask Agent"
  short_description: "Quick precise answers"
  brand_color: "#3B82F6"
  default_prompt: "What is your doubt?"
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
