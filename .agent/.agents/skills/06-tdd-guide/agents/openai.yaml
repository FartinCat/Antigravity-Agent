interface:
  display_name: "TDD Guide"
  short_description: "Strict Red-Green-Refactor test-driven development enforcer"
  brand_color: "#10B981"
  default_prompt: "Start a TDD cycle for this feature. Write the failing test first."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
