interface:
  display_name: "Git Commit Author"
  short_description: "Generates formatted Git commit commands"
  brand_color: "#10B981"
  default_prompt: "Generate git commit messages."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
