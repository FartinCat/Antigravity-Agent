interface:
  display_name: "Premium Web Aesthetics"
  short_description: "Enforce 'Wow' UI, animations, and typography"
  brand_color: "#EC4899"
  default_prompt: "Apply premium modern aesthetics to this interface."
policy:
  allow_implicit_invocation: true


operations:
  arithmetic: ["add", "subtract", "multiply", "divide"]
  statistics: ["mean", "median", "stddev", "min", "max"]
  data_processing: ["filter", "map", "reduce", "sort", "find"]
  calculations: ["power", "sqrt", "log", "exp"]
